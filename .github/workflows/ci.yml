name: CI

# Fast, minimal gate for the box agent. Two jobs:
#   compile — cross-platform py_compile syntax check of every agent entrypoint,
#             including the Windows agent (py_compile is syntax-only, so it is a
#             valid gate on ubuntu; a real windows-latest smoke build is a
#             future add — see the note in the job below).
#   smoke   — boot couchsided.py headless in --mock mode on a spare port and hit
#             a real authed endpoint to prove it serves + auth still works.

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # py_compile is a pure-syntax check and is cross-platform: compiling the
      # Windows agent here on ubuntu catches syntax regressions without a Windows
      # runner. Task 27: a genuine windows-latest build/import of couchsided-win.py
      # (pywin32 / ViGEmBus deps, tray widget) is a FUTURE add and intentionally
      # not gated here so CI stays fast and free of Windows-only dependencies.
      - name: py_compile agent entrypoints
        run: |
          python3 -m py_compile \
            agent/couchsided.py \
            agent/win/couchsided-win.py \
            agent/qr.py
          echo "py_compile OK"

      # The guide-hold trigger fires a SESSION SWITCH, which tears down the
      # user's desktop and any unsaved work. Its two dangerous failure modes —
      # firing on a tap, and matching the agent's OWN emulated pad (created on
      # every phone connect) — are invisible to the --mock smoke test below and
      # otherwise need real hardware plus a controller to catch. Pure stdlib, no
      # pytest, runs in well under a second.
      - name: Unit tests (guide-hold trigger)
        run: python3 tests/test_guide_hold.py

      # Gamepad handoff lifecycle: a re-promoted session must REUSE its virtual
      # pad. The old always-create path orphaned a pad per Pass/take-back cycle
      # (fd left open -> phantom controller until the agent exits), and the
      # resulting churn corrupted a real box's Steam desktop controller config.
      - name: Unit tests (gamepad handoff)
        run: python3 tests/test_gamepad_handoff.py

      # The d-pad is a LATCHED absolute axis (DPAD_MAP -> ABS_HAT0X/Y), not an
      # edge-triggered key, and nothing re-zeroes it: no stuck-button watchdog,
      # and the 12s idle reap never fires while the app pings every 5s. ONE
      # missing release therefore pins the axis and Steam auto-repeats it
      # forever -- the "swipe sticks and keeps going that direction" bug.
      # _release_devices() destroyed a demoted pad without zeroing it, while
      # carefully zeroing the mouse two lines below.
      - name: Unit tests (dpad latch)
        run: python3 tests/test_dpad_latch.py

      # Couch Mode ceremony: the staged desktop->TV switch. Its whole reason for
      # existing is to stop two lies (a fake-green "Ready" that didn't verify
      # Game Mode came up, and audio that silently "skipped" onto the wrong
      # device). These drive the real worker with env I/O stubbed.
      - name: Unit tests (couch ceremony)
        run: python3 tests/test_couch_ceremony.py

      # Leaving Couch Mode used to GUESS its way back, picking whichever sink had
      # "speaker"/"analog"/"pci" in its name and making that the system default.
      # That is a substitution, not a restore, and it cost a user their audio.
      # These pin the rule: put audio back exactly where it was, or leave it
      # alone -- never pick a device the user did not choose.
      - name: Unit tests (audio sink restore)
        run: python3 tests/test_audio_sink_restore.py

      # Which filesystems the dashboard reports. A Deck owner was shown
      # "3.5 / 5.0 GB, 69%" because read_disks() only looked at "/" -- which on
      # SteamOS is a small READ-ONLY rootfs -- and never mentioned /home. Asserts
      # both directions of the read-only rule, and that one filesystem reached by
      # two paths is one row rather than two identical ones.
      - name: Unit tests (disk mounts)
        run: python3 tests/test_disk_mounts.py

      # USB wake sources (/api/usb-wake), read-only. Two field reports are
      # encoded here: arming only the ROOT HUBS misses controllers (their signal
      # arrives through a dongle further down the tree), and arming EVERY device
      # with a writable wakeup file causes spurious wakes (a controller powering
      # itself off is a disconnect, which the kernel counts as a wake — one
      # reporter's machine woke 15 minutes after he slept it). Fixtures are
      # verbatim off a live Bazzite box, Xbox dongle included, and one test
      # exists purely to keep the `transient` heuristic's known counterexample
      # visible rather than rediscovered by a user.
      - name: Unit tests (usb wake)
        run: python3 tests/test_usb_wake.py

      # On-screen-keyboard detection: when Steam raises its keyboard on the TV,
      # the phone raises its own. There is no general text-field-focus signal on
      # this platform, so the agent reads Steam's own UI log -- the same trick
      # stream_host_online() uses. Measured on a live Bazzite box: each open
      # emits exactly TWO lines (hence dedupe), and the NEGATIVE CONTROL matters
      # most -- navigating the library/tabs/store produced zero markers, which is
      # what makes the signal keyboard-specific rather than focus-in-general.
      # The marker is undocumented, so every path degrades closed.
      - name: Unit tests (osk watch)
        run: python3 tests/test_osk_watch.py

      # The desktop switch must honour the box's CONFIGURED session. SteamOS
      # ships both, and steamos-session-select maps the bare "plasma" arg to the
      # X11 one -- so passing it silently downgraded a Wayland-configured box to
      # X11 on every Couch Mode return. Measured on a real Deck: default was
      # plasma.desktop (Wayland), session ended up x11. Degrading CLOSED is the
      # load-bearing part: an unreadable or unlisted name must fall back to the
      # X11 pair that shipped before, so a box we cannot read is unchanged.
      - name: Unit tests (desktop session)
        run: python3 tests/test_desktop_session.py

      # Two places the agent reported success it had not verified.
      # couchmode_start() returned ok because the switch SUBPROCESS exited 0 --
      # but steamos-session-select returns as soon as the switch is TRIGGERED, so
      # a compositor that never came up produced a green result on a black TV, on
      # both the HTTP and guide-hold paths. And real_screen_frame() served
      # whatever came back: _png_complete only proves an IEND chunk exists, and
      # an all-black readback is a well-formed PNG. The inconclusive case is
      # asserted too -- a frame that CANNOT be measured must still be served, or
      # every box without magick/ffmpeg would lose its preview.
      - name: Unit tests (verified success)
        run: python3 tests/test_verified_success.py

      # Steam Remote Play discovery: parse remoteclients.vdf (streamable host
      # games) + the v29 appinfo.vdf name cache (a synthetic fixture locks the
      # binary parser), the most-recent-host de-dupe, the tool filter, and the
      # launch allowlist gate. Native in-home streaming, no Steam Link install.
      - name: Unit tests (steam link / remote play)
        run: python3 tests/test_steamlink.py

      # Stream-host liveness (the `online` field). remoteclients.vdf lists every
      # host ever streamed from and says nothing about which are ON, so picking a
      # game from a sleeping PC makes Steam offer a multi-GB install instead.
      # Detection joins on the 64-bit Steam CLIENT ID (a box keeps it across a
      # rename) and reads a STATE out of Steam's own remote-connections log --
      # beacon recency alone was measured unusable (median gap 9s but p99 2725s).
      # Fixtures are relative to now; a dated fixture plus an age cap is a time
      # bomb, which this repo has already paid for once.
      - name: Unit tests (stream host liveness)
        run: python3 tests/test_stream_online.py

      # TV identification. A user aimed pairing at an LG COMMERCIAL signage
      # panel the scan had offered, and got "_ssl.c:1063: The handshake
      # operation timed out" -- a raw socket error that says nothing about the
      # real problem. Measured: the panel opens 3001 in 6ms and never
      # handshakes, while opening 9761; a consumer set completes TLSv1.3 and
      # refuses 9761. So an open port is NOT an identification, and the
      # commercial check must precede the consumer one because both open 3001.
      - name: Unit tests (tv identify)
        run: python3 tests/test_tv_identify.py

      # Config load. _parse_config() returns a POSITIONAL tuple that
      # load_config() unpacks, so a new optional section must be threaded
      # through both ends -- miss either and the agent crash-loops on startup
      # with a NameError. That shipped to a real box and was missed by
      # py_compile (syntax only), by importing the module (load_config is never
      # reached), and by starting with an EMPTY config (invalid input takes the
      # defaults path and returns BEFORE the unpack). Only a config with real
      # content exercises it.
      - name: Unit tests (config load)
        run: python3 tests/test_config_load.py

      # Three-way protocol parity. The Linux agent, the Windows agent and the
      # app each carry their own copy of the wire vocabulary, and "added to one
      # end, not the other" is this repo's most repeated defect -- a config
      # section that reached _parse_config but not load_config's unpack
      # crash-looped a live box, and the smart-TV backends existed on Linux for
      # weeks before Windows. protocol/protocol.json is the authority; this
      # drives both agents' REAL decoders (their internal tables legitimately
      # differ -- uinput vs ViGEm) and reads the app's literal TS unions, in
      # BOTH directions.
      - name: Unit tests (protocol parity)
        run: python3 tests/test_protocol_parity.py

      # Config SAVES must land beside the config, not in the process CWD. The
      # temp-file dir came from `dirname(CONFIG_PATH) or "."`, and mkstemp
      # returns an ABSOLUTE path -- so "." followed the CWD, which for a systemd
      # service is "/". A relative --config therefore wrote to the root
      # filesystem; on SteamOS that is read-only, and pairing a TV on a Steam
      # Deck died with "[Errno 30] Read-only file system:
      # '/.couchside-config-il0oed3c'". Reproducing it needs no read-only mount:
      # the defect is following the CWD at all. Covers BOTH agents -- Windows
      # shipped the identical block, where the stray CWD is System32.
      - name: Unit tests (config write)
        run: python3 tests/test_config_write.py
      # Decky detection. install.sh gated co-existence on `[ -d ~/homebrew/plugins ]`,
      # but Decky's OWN uninstaller removes the unit and services/PluginLoader and
      # LEAVES that directory behind -- so a box that had uninstalled Decky still
      # tested as having it, left couchside.service DORMANT, and handed the agent
      # to a plugin that could never load. Net result: no running agent. The test
      # extracts the real function from install.sh so it fails on drift.
      - name: Unit tests (decky detection)
        run: bash tests/test_decky_detect.sh

      # Gaming card (/api/gaming): the card* glob trap (a cardN-DP-1 connector
      # dir must not be read as a GPU), the reaper AppId matcher incl. the
      # [oom_reaper] reject, the empty-power_supply desktop case + the uniq (never
      # phys) battery join, and per-field probe-and-appear. Drives the real
      # functions against sysfs/proc fixtures via the module-constant roots.
      - name: Unit tests (gaming card)
        run: python3 tests/test_gaming_card.py

      # The on-box pairing page: both loopback gates (peer IP + Host header,
      # anti-DNS-rebinding — a box's token must never leave its own screen), the
      # idle tutorial + its reload-into-PIN handoff, the PIN state machine
      # (attempt cap / expiry / single-use, previously untested — KI-020), and
      # the KI-019 box-pop throttle. The renders + handoff were also proven on a
      # real box's CEF; this guards the logic a refactor could quietly break.
      - name: Unit tests (pairing page)
        run: python3 tests/test_pair_page.py

      # The flatpak slice of the update hub. Asserts the SECURITY SHAPE (§3):
      # the update functions take zero client-reachable arguments, the elevated
      # argv is exactly the fixed root-owned wrapper (never raw flatpak, whose
      # subcommands include install/run), the installer's wrapper ignores its
      # argv, the opt-in grant names the wrapper path only, and the elevation
      # probe degrades closed. Mutation-checked (probe pointed at raw flatpak
      # fails). Live counterpart proven on a real box: root wrapper bypasses the
      # polkit denial that blocks the sessionless agent's own flatpak update.
      - name: Unit tests (flatpak update)
        run: python3 tests/test_flatpak_update.py

      # Stream-host detection (/api/stream-host, phase 4a — detect only). The
      # fixtures are verbatim /proc/net lines off a live box, so they encode the
      # real trap: an ESTABLISHED TCP peer on 27036 is the ROUTER, not a session,
      # and a client's connection outlives its stream. Detection is log-driven
      # (both edges + names the client), cross-checked against the data port
      # (udp/27031) so a host that dies WITHOUT writing its stop marker does not
      # leave the card advertising a dead session for 12 hours.
      - name: Unit tests (stream host)
        run: python3 tests/test_stream_host.py

      # Screen capture backend selection. couchside.service and the Steam
      # session race at boot: measured on a real box, the agent came up 34
      # seconds BEFORE the gamescope socket existed, cached "desktop/spectacle"
      # for its whole uptime, and fired a KDE screenshot tool at a gamescope
      # session -- every frame 503 until someone restarted the service. These
      # drive the socket set CHANGING after startup, which is the only shape
      # that catches it; a test that merely checks a correct startup passes
      # against the bug.
      - name: Unit tests (screen capture)
        run: python3 tests/test_screen_capture.py

      # Injected actions: buttons the agent offers only when the box can really
      # perform them ("a dead button costs more trust than a missing one"), so
      # every gate is asserted in BOTH directions. Covers the Bluetooth pairing
      # deep link, whose URL is NOT a literal in Steam's JS bundle — grepping
      # for it proves nothing, which is how an earlier pass wrongly concluded no
      # such deep link existed. Also pins idempotency and config-wins.
      - name: Unit tests (injected actions)
        run: python3 tests/test_actions_inject.py

      # Steam settings deep links (/api/steam/menus). The slug list CANNOT be
      # derived from Steam's JS bundle (routes are built from the panel name, so
      # no slug is a literal in it) and a WRONG slug is silently non-fatal —
      # Steam just opens its default page — so a bad entry ships as a button
      # that works and goes somewhere else. Every slug was confirmed by screen-
      # capturing a real box; this gate pins that the ones measured ABSENT stay
      # absent, and that the id never reaches a shell.
      - name: Unit tests (steam settings menus)
        run: python3 tests/test_steam_menus.py

      # Makes branch feat/demo-mode UNMERGEABLE. Demo mode (tap indicators + a
      # rear-camera PiP, for recording promo video) is a developer tool shipped as
      # an ad-hoc, bundle-id-forked build that never touches TestFlight. Its own
      # isolation test lives on that branch -- which is useless as a merge guard,
      # because merging the branch merges its approval. So the guard lives HERE.
      # The trap it catches: on that branch the expo-camera CONFIG PLUGIN is
      # conditional but the DEPENDENCY is not, and autolinking keys off
      # package.json -- measured, 24 modules with expo-camera in node_modules but
      # absent from package.json, and it does not link. Declare it and it does. A
      # merge would therefore compile camera code into the shipping binary with no
      # purpose string. Red CI beats finding that out at upload.
      - name: Unit tests (no camera in the shipping app)
        run: python3 tests/test_no_camera_in_shipping_app.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      # The ONLY automated check the drag-stroke geometry can have. React Native
      # Web emits mouse events, never touch events, so onTouchMove never fires
      # in the web harness and the trail path cannot be driven there at all --
      # which is how a version that drew nothing on a real iPhone passed every
      # pre-ship check. Node runs the .ts directly via type stripping; no build.
      - name: Unit tests (touch drag stroke geometry)
        run: node --experimental-strip-types app/__tests__/touch-trail.ts

      # KI-002: the app had NO automated signal of any kind. Every escaped bug
      # this project has paid for lately was in app/ -- a tap shipped broken to
      # TestFlight, a link that overflowed only on Android, a button occluded
      # only on a handheld -- while CI ran 25 Python steps for the agent and
      # zero for the app. A typecheck is not a test, but it is the cheapest
      # thing that fails on a push that does not compile, which is currently
      # nobody's job but the author's memory.
      - name: Install app deps
        run: npm ci --prefix app --no-audit --no-fund
      - name: Typecheck the app
        run: npx --prefix app tsc --noEmit -p app

  smoke:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Boot the agent headless with --mock (never touches uinput/hardware/CEC),
      # a throwaway literal token, and a minimal valid config on a spare port.
      # Then hit an AUTHED endpoint (/api/status) with the token and assert
      # 200 + JSON. /api/ping is public by design (pre-auth), so we also verify a
      # no-token request to /api/status is rejected (401) to prove the auth gate.
      - name: Boot agent (mock) and probe authed endpoint
        run: |
          set -euo pipefail
          PORT=8791
          TOKEN="ci-smoke-$RANDOM$RANDOM"
          CFG="$RUNNER_TEMP/couchside-ci-config.json"
          cat > "$CFG" <<'JSON'
          {
            "units": [{"name": "sshd.service", "scope": "system"}],
            "actions": {}
          }
          JSON

          python3 agent/couchsided.py \
            --mock --host 127.0.0.1 --port "$PORT" \
            --token "$TOKEN" --config "$CFG" \
            > "$RUNNER_TEMP/agent.log" 2>&1 &
          AGENT_PID=$!
          # Always dump the log and reap the agent, even on failure.
          trap 'echo "----- agent.log -----"; cat "$RUNNER_TEMP/agent.log" || true; kill "$AGENT_PID" 2>/dev/null || true' EXIT

          # Wait for the socket to bind (best-effort boot; ~9s budget).
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:$PORT/api/ping" >/dev/null 2>&1; then
              echo "agent bound after $i tries"
              break
            fi
            if ! kill -0 "$AGENT_PID" 2>/dev/null; then
              echo "agent process exited during boot" >&2
              exit 1
            fi
            sleep 0.3
          done

          # Public pre-auth endpoint must be 200.
          PING_CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$PORT/api/ping")
          echo "GET /api/ping -> $PING_CODE"
          [ "$PING_CODE" = "200" ] || { echo "expected /api/ping 200, got $PING_CODE" >&2; exit 1; }

          # No token -> the authed endpoint must reject (proves the gate is live).
          NOAUTH_CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$PORT/api/status")
          echo "GET /api/status (no token) -> $NOAUTH_CODE"
          [ "$NOAUTH_CODE" = "401" ] || { echo "expected /api/status 401 without token, got $NOAUTH_CODE" >&2; exit 1; }

          # With token -> 200 and a JSON body.
          BODY="$RUNNER_TEMP/status.json"
          AUTH_CODE=$(curl -s -o "$BODY" -w '%{http_code}' \
            -H "Authorization: Bearer $TOKEN" "http://127.0.0.1:$PORT/api/status")
          echo "GET /api/status (token) -> $AUTH_CODE"
          [ "$AUTH_CODE" = "200" ] || { echo "expected /api/status 200 with token, got $AUTH_CODE" >&2; exit 1; }
          python3 -c "import json,sys; json.load(open('$BODY')); print('authed body is valid JSON')"

          # The guide-hold route must be served and authed like any other. In
          # --mock it answers 200 with a synthetic controller list; on a real box
          # it 404s when the handoff or evdev is unavailable, which is how the
          # app decides whether to show the row at all.
          GBODY="$RUNNER_TEMP/guide.json"
          GUIDE_CODE=$(curl -s -o "$GBODY" -w '%{http_code}' \
            -H "Authorization: Bearer $TOKEN" "http://127.0.0.1:$PORT/api/guide-hold")
          echo "GET /api/guide-hold (token) -> $GUIDE_CODE"
          [ "$GUIDE_CODE" = "200" ] || { echo "expected /api/guide-hold 200 in mock, got $GUIDE_CODE" >&2; exit 1; }
          python3 - "$GBODY" <<'PY'
          import json, sys
          d = json.load(open(sys.argv[1]))
          # Must ship OFF by default: a false trigger destroys unsaved desktop work.
          assert d["enabled"] is False, "guide-hold must default to disabled"
          assert isinstance(d["controllers"], list), "controllers must be a list"
          print("guide-hold body OK (enabled=%s)" % d["enabled"])
          PY

          echo "smoke OK"
