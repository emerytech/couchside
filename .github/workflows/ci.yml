name: CI

# Fast, minimal gate for the box agent. Two jobs:
#   compile — cross-platform py_compile syntax check of every agent entrypoint,
#             including the Windows agent (py_compile is syntax-only, so it is a
#             valid gate on ubuntu; a real windows-latest smoke build is a
#             future add — see the note in the job below).
#   smoke   — boot couchsided.py headless in --mock mode on a spare port and hit
#             a real authed endpoint to prove it serves + auth still works.

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # py_compile is a pure-syntax check and is cross-platform: compiling the
      # Windows agent here on ubuntu catches syntax regressions without a Windows
      # runner. Task 27: a genuine windows-latest build/import of couchsided-win.py
      # (pywin32 / ViGEmBus deps, tray widget) is a FUTURE add and intentionally
      # not gated here so CI stays fast and free of Windows-only dependencies.
      - name: py_compile agent entrypoints
        run: |
          python3 -m py_compile \
            agent/couchsided.py \
            agent/win/couchsided-win.py \
            agent/qr.py
          echo "py_compile OK"

      # The guide-hold trigger fires a SESSION SWITCH, which tears down the
      # user's desktop and any unsaved work. Its two dangerous failure modes —
      # firing on a tap, and matching the agent's OWN emulated pad (created on
      # every phone connect) — are invisible to the --mock smoke test below and
      # otherwise need real hardware plus a controller to catch. Pure stdlib, no
      # pytest, runs in well under a second.
      - name: Unit tests (guide-hold trigger)
        run: python3 tests/test_guide_hold.py

      # Gamepad handoff lifecycle: a re-promoted session must REUSE its virtual
      # pad. The old always-create path orphaned a pad per Pass/take-back cycle
      # (fd left open -> phantom controller until the agent exits), and the
      # resulting churn corrupted a real box's Steam desktop controller config.
      - name: Unit tests (gamepad handoff)
        run: python3 tests/test_gamepad_handoff.py

      # Couch Mode ceremony: the staged desktop->TV switch. Its whole reason for
      # existing is to stop two lies (a fake-green "Ready" that didn't verify
      # Game Mode came up, and audio that silently "skipped" onto the wrong
      # device). These drive the real worker with env I/O stubbed.
      - name: Unit tests (couch ceremony)
        run: python3 tests/test_couch_ceremony.py

      # Steam Remote Play discovery: parse remoteclients.vdf (streamable host
      # games) + the v29 appinfo.vdf name cache (a synthetic fixture locks the
      # binary parser), the most-recent-host de-dupe, the tool filter, and the
      # launch allowlist gate. Native in-home streaming, no Steam Link install.
      - name: Unit tests (steam link / remote play)
        run: python3 tests/test_steamlink.py

      # Gaming card (/api/gaming): the card* glob trap (a cardN-DP-1 connector
      # dir must not be read as a GPU), the reaper AppId matcher incl. the
      # [oom_reaper] reject, the empty-power_supply desktop case + the uniq (never
      # phys) battery join, and per-field probe-and-appear. Drives the real
      # functions against sysfs/proc fixtures via the module-constant roots.
      - name: Unit tests (gaming card)
        run: python3 tests/test_gaming_card.py

      # Stream-host detection (/api/stream-host, phase 4a — detect only). The
      # fixtures are verbatim /proc/net lines off a live box, so they encode the
      # real trap: an ESTABLISHED TCP peer on 27036 is the ROUTER, not a session,
      # and a client's connection outlives its stream. Detection is log-driven
      # (both edges + names the client), cross-checked against the data port
      # (udp/27031) so a host that dies WITHOUT writing its stop marker does not
      # leave the card advertising a dead session for 12 hours.
      - name: Unit tests (stream host)
        run: python3 tests/test_stream_host.py

      # Injected actions: buttons the agent offers only when the box can really
      # perform them ("a dead button costs more trust than a missing one"), so
      # every gate is asserted in BOTH directions. Covers the Bluetooth pairing
      # deep link, whose URL is NOT a literal in Steam's JS bundle — grepping
      # for it proves nothing, which is how an earlier pass wrongly concluded no
      # such deep link existed. Also pins idempotency and config-wins.
      - name: Unit tests (injected actions)
        run: python3 tests/test_actions_inject.py

      # Steam settings deep links (/api/steam/menus). The slug list CANNOT be
      # derived from Steam's JS bundle (routes are built from the panel name, so
      # no slug is a literal in it) and a WRONG slug is silently non-fatal —
      # Steam just opens its default page — so a bad entry ships as a button
      # that works and goes somewhere else. Every slug was confirmed by screen-
      # capturing a real box; this gate pins that the ones measured ABSENT stay
      # absent, and that the id never reaches a shell.
      - name: Unit tests (steam settings menus)
        run: python3 tests/test_steam_menus.py

  smoke:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Boot the agent headless with --mock (never touches uinput/hardware/CEC),
      # a throwaway literal token, and a minimal valid config on a spare port.
      # Then hit an AUTHED endpoint (/api/status) with the token and assert
      # 200 + JSON. /api/ping is public by design (pre-auth), so we also verify a
      # no-token request to /api/status is rejected (401) to prove the auth gate.
      - name: Boot agent (mock) and probe authed endpoint
        run: |
          set -euo pipefail
          PORT=8791
          TOKEN="ci-smoke-$RANDOM$RANDOM"
          CFG="$RUNNER_TEMP/couchside-ci-config.json"
          cat > "$CFG" <<'JSON'
          {
            "units": [{"name": "sshd.service", "scope": "system"}],
            "actions": {}
          }
          JSON

          python3 agent/couchsided.py \
            --mock --host 127.0.0.1 --port "$PORT" \
            --token "$TOKEN" --config "$CFG" \
            > "$RUNNER_TEMP/agent.log" 2>&1 &
          AGENT_PID=$!
          # Always dump the log and reap the agent, even on failure.
          trap 'echo "----- agent.log -----"; cat "$RUNNER_TEMP/agent.log" || true; kill "$AGENT_PID" 2>/dev/null || true' EXIT

          # Wait for the socket to bind (best-effort boot; ~9s budget).
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:$PORT/api/ping" >/dev/null 2>&1; then
              echo "agent bound after $i tries"
              break
            fi
            if ! kill -0 "$AGENT_PID" 2>/dev/null; then
              echo "agent process exited during boot" >&2
              exit 1
            fi
            sleep 0.3
          done

          # Public pre-auth endpoint must be 200.
          PING_CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$PORT/api/ping")
          echo "GET /api/ping -> $PING_CODE"
          [ "$PING_CODE" = "200" ] || { echo "expected /api/ping 200, got $PING_CODE" >&2; exit 1; }

          # No token -> the authed endpoint must reject (proves the gate is live).
          NOAUTH_CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$PORT/api/status")
          echo "GET /api/status (no token) -> $NOAUTH_CODE"
          [ "$NOAUTH_CODE" = "401" ] || { echo "expected /api/status 401 without token, got $NOAUTH_CODE" >&2; exit 1; }

          # With token -> 200 and a JSON body.
          BODY="$RUNNER_TEMP/status.json"
          AUTH_CODE=$(curl -s -o "$BODY" -w '%{http_code}' \
            -H "Authorization: Bearer $TOKEN" "http://127.0.0.1:$PORT/api/status")
          echo "GET /api/status (token) -> $AUTH_CODE"
          [ "$AUTH_CODE" = "200" ] || { echo "expected /api/status 200 with token, got $AUTH_CODE" >&2; exit 1; }
          python3 -c "import json,sys; json.load(open('$BODY')); print('authed body is valid JSON')"

          # The guide-hold route must be served and authed like any other. In
          # --mock it answers 200 with a synthetic controller list; on a real box
          # it 404s when the handoff or evdev is unavailable, which is how the
          # app decides whether to show the row at all.
          GBODY="$RUNNER_TEMP/guide.json"
          GUIDE_CODE=$(curl -s -o "$GBODY" -w '%{http_code}' \
            -H "Authorization: Bearer $TOKEN" "http://127.0.0.1:$PORT/api/guide-hold")
          echo "GET /api/guide-hold (token) -> $GUIDE_CODE"
          [ "$GUIDE_CODE" = "200" ] || { echo "expected /api/guide-hold 200 in mock, got $GUIDE_CODE" >&2; exit 1; }
          python3 - "$GBODY" <<'PY'
          import json, sys
          d = json.load(open(sys.argv[1]))
          # Must ship OFF by default: a false trigger destroys unsaved desktop work.
          assert d["enabled"] is False, "guide-hold must default to disabled"
          assert isinstance(d["controllers"], list), "controllers must be a list"
          print("guide-hold body OK (enabled=%s)" % d["enabled"])
          PY

          echo "smoke OK"
